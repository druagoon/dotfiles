# 1. Output and Download Path
-o "%(title)s [%(id)s].%(ext)s"
# Uncomment and set your preferred download directory
-P "~/Downloads/Videos"

# 2. Video Format and Quality (Max 4K resolution to save space/compatibility)
-f "bv*[height<=2160]+ba/b"
--merge-output-format mp4/mkv

# 3. Subtitles
--write-subs
--write-auto-subs
--sub-langs "en,zh-Hans,zh-Hant,ja"
--embed-subs

# 4. Metadata and Thumbnails
--embed-metadata
--embed-thumbnail
--convert-thumbnails png

# 5. Network and Performance
--retries 10
--fragment-retries 10
--socket-timeout 30
--file-access-retries 3

# 6. Geo-blocking and Security (Optional, uncomment if needed)
# --cookies-from-browser chrome
