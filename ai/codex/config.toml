#:schema https://raw.githubusercontent.com/openai/codex/main/codex-rs/core/config.schema.json

model = "gpt-5.6-sol"
# model_verbosity = "high"
model_reasoning_effort = "high"
personality = "pragmatic"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true

[features]
default_mode_request_user_input = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."chrome@openai-bundled"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."pdf@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."sites@openai-bundled"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."template-creator@openai-primary-runtime"]
enabled = true

[plugins."visualize@openai-bundled"]
enabled = true

[desktop]
ambient-suggestions-enabled = false
appearanceDarkCodeThemeId = "codex"
appearanceDiffMarkerStyle = "symbols"
appearanceLightCodeThemeId = "codex"
composerEnterBehavior = "cmdAlways"
conversationDetailMode = "STEPS_COMMANDS"
defaultTerminalLocation = "bottom"
dock-icon-preference = "codex-system"
followUpQueueMode = "queue"
git-commit-instructions = """
**Role:** You are an expert Software Engineer and Git Version Control specialist.
**Task:** Generate a strict Conventional Commit message based on the provided code diff, git status, or user description.

**Rules & Formatting:**
1. **Language Constraint:** STRICTLY use English for the entire commit message (subject, body, and footer). Do not use any other language.

2. **Structure:**
   <type>(<optional scope>): <subject>
   <BLANK LINE>
   [optional body]
   <BLANK LINE>
   [optional footer]

3. **Allowed Types:**
   * `feat`: A new feature
   * `fix`: A bug fix
   * `docs`: Documentation only changes
   * `style`: Changes that do not affect the meaning of the code (white-space, formatting, missing semi-colons, etc.)
   * `refactor`: A code change that neither fixes a bug nor adds a feature
   * `perf`: A code change that improves performance
   * `test`: Adding missing tests or correcting existing tests
   * `build`: Changes that affect the build system or external dependencies
   * `ci`: Changes to CI configuration files and scripts
   * `chore`: Other changes that don't modify src or test files
   * `revert`: Reverts a previous commit

4. **Subject Line Guidelines:**
   * Use imperative, present tense: "change" not "changed" nor "changes".
   * Do not capitalize the first letter.
   * Do not place a period (.) at the end.
   * Keep it concise (strictly under 72 characters).

5. **Body Guidelines:**
   * Use imperative, present tense.
   * Explain the *what* and *why* of the change, not the *how*.
   * Contrast the new behavior with the previous behavior.
   * Wrap text at 72 characters per line.

6. **Breaking Change & Footer Guidelines:**
   * Mark breaking changes with `!` after the type/scope or with a footer starting with `BREAKING CHANGE: ` followed by a description.
   * Reference open issues or PRs that this commit closes (e.g., `Closes #123`, `Fixes #456`).

**Output Constraint:** Return ONLY the raw commit message. Do not include conversational filler, greetings, or explanations."""
git-show-sidebar-pr-icons = true
preventSleepWhileRunning = true
reviewDelivery = "inline"
show-context-window-usage = true
usePointerCursors = true

[desktop.appearanceLightChromeTheme]
accent = "#0169cc"
contrast = 45
ink = "#0d0d0d"
opaqueWindows = false
surface = "#ffffff"

[desktop.appearanceLightChromeTheme.fonts]

[desktop.appearanceLightChromeTheme.semanticColors]
diffAdded = "#00a240"
diffRemoved = "#e02e2a"
skill = "#751ed9"

[desktop.appearanceDarkChromeTheme]
accent = "#0169cc"
contrast = 60
ink = "#fcfcfc"
opaqueWindows = false
surface = "#111111"

[desktop.appearanceDarkChromeTheme.fonts]

[desktop.appearanceDarkChromeTheme.semanticColors]
diffAdded = "#00a240"
diffRemoved = "#e02e2a"
skill = "#b06dff"
